<!DOCTYPE html>
<html lang="en">

<head>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #060613;
            font-family: 'Inter', sans-serif;
            color: #f0f0ff;
            min-height: 100vh;
            padding: 60px 40px
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(240, 240, 255, .35);
            letter-spacing: .14em;
            text-transform: uppercase;
            margin-bottom: 60px;
            text-align: center
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 980px;
            margin: 0 auto
        }

        .card {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 20px;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px
        }

        .card.dark-bg {
            background: #0d0d20
        }

        .card.light-bg {
            background: #f5f5fa
        }

        .card-label {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: rgba(240, 240, 255, .35);
            margin-top: 4px
        }

        .card.light-bg .card-label {
            color: rgba(20, 20, 60, .4)
        }

        .full {
            grid-column: 1/3
        }

        .row {
            display: flex;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            justify-content: center
        }
    </style>
</head>
